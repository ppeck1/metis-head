<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metis Head Mock Brain</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: #f6f7f9;
      color: #1d2430;
    }
    body { margin: 0; }
    header {
      padding: 18px 24px;
      background: #ffffff;
      border-bottom: 1px solid #d8dde5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { font-size: 20px; margin: 0; letter-spacing: 0; }
    main {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    section {
      background: #ffffff;
      border: 1px solid #d8dde5;
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }
    h2 { font-size: 15px; margin: 0 0 12px; letter-spacing: 0; }
    pre {
      white-space: pre-wrap;
      overflow: auto;
      background: #f1f3f6;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      max-height: 420px;
    }
    button {
      border: 1px solid #9aa7b8;
      background: #ffffff;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { background: #edf2f7; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-7 { grid-column: span 7; }
    .span-12 { grid-column: span 12; }
    .metric { font-size: 32px; font-weight: 700; }
    .label { color: #536173; font-size: 12px; }
    .leds { display: flex; gap: 16px; }
    .led { display: grid; gap: 8px; justify-items: center; }
    .dot { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #7b8795; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .span-3, .span-4, .span-5, .span-7, .span-12 { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Metis Head Mock Brain</h1>
    <div class="controls">
      <button onclick="refresh()">Refresh</button>
      <button onclick="runAll()">Run Scenarios</button>
      <button onclick="postEvent({type:'button_event',button:'loud',state:'off'})">Mute Output</button>
      <button onclick="postEvent({type:'hardware_privacy',device:'mic',enabled:false})">Mic Cutoff</button>
      <button onclick="postEvent({type:'failure_event',failure_id:'governance_block'})">Governance Block</button>
      <button onclick="fetch('/metis/failures/clear',{method:'POST'}).then(refresh)">Clear Failures</button>
    </div>
  </header>
  <main>
    <section class="span-3">
      <h2>Readiness</h2>
      <div class="metric" id="score">--</div>
      <div class="label" id="domain"></div>
      <pre id="readiness"></pre>
    </section>
    <section class="span-4">
      <h2>LED State</h2>
      <div class="leds">
        <div class="led"><div id="activityDot" class="dot"></div><div id="activityText" class="label"></div></div>
        <div class="led"><div id="authorityDot" class="dot"></div><div id="authorityText" class="label"></div></div>
      </div>
      <pre id="leds"></pre>
    </section>
    <section class="span-5">
      <h2>Adapter Health</h2>
      <pre id="adapters"></pre>
    </section>
    <section class="span-7">
      <h2>Canonical State</h2>
      <pre id="state"></pre>
    </section>
    <section class="span-5">
      <h2>Scenario Results</h2>
      <pre id="scenarios"></pre>
    </section>
    <section class="span-12">
      <h2>Event Log</h2>
      <pre id="eventLog"></pre>
    </section>
  </main>
  <script>
    function colorFor(name) {
      return {
        red: '#d63b3b',
        amber: '#d89a22',
        blue: '#2f6fbe',
        green: '#2d9b67',
        cyan: '#2a9fb8',
        soft_white: '#f5f2e8',
        dim_white: '#c7cbd1'
      }[name] || '#d7dce3';
    }
    async function postEvent(event) {
      await fetch('/metis/event', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(event)});
      await refresh();
    }
    async function runAll() {
      const result = await fetch('/metis/scenario/run', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'}).then(r => r.json());
      document.getElementById('scenarios').textContent = JSON.stringify(result, null, 2);
      await refresh();
    }
    async function refresh() {
      const data = await fetch('/metis/state').then(r => r.json());
      document.getElementById('score').textContent = data.readiness.score + '%';
      document.getElementById('domain').textContent = data.readiness.readiness_domain;
      document.getElementById('readiness').textContent = JSON.stringify(data.readiness, null, 2);
      document.getElementById('leds').textContent = JSON.stringify(data.leds, null, 2);
      document.getElementById('state').textContent = JSON.stringify(data.state, null, 2);
      document.getElementById('eventLog').textContent = JSON.stringify(data.state.event_log, null, 2);
      document.getElementById('adapters').textContent = JSON.stringify(data.state.input_adapters, null, 2);
      document.getElementById('activityDot').style.background = colorFor(data.leds.activity_led.color);
      document.getElementById('authorityDot').style.background = colorFor(data.leds.authority_led.color);
      document.getElementById('activityText').textContent = data.leds.activity_led.state;
      document.getElementById('authorityText').textContent = data.leds.authority_led.state;
      const existing = await fetch('/metis/scenario/results').then(r => r.json());
      document.getElementById('scenarios').textContent = JSON.stringify(existing, null, 2);
    }
    refresh();
  </script>
</body>
</html>
